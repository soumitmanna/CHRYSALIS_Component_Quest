<!DOCTYPE html>
<html>
<head>

    <title>Upload Component</title>

    <style>

        body{
            font-family:Arial;
            text-align:center;
            background:#f4f7fa;
            padding-top:50px;
        }

        .card{
            background:white;
            width:500px;
            margin:auto;
            padding:30px;
            border-radius:15px;
            box-shadow:0px 4px 10px rgba(0,0,0,0.1);
        }

        button{
            padding:10px 20px;
            background:#27ae60;
            color:white;
            border:none;
            border-radius:10px;
            cursor:pointer;
        }

        button:hover{
            background:#219150;
        }

        a{
            text-decoration:none;
        }

    </style>

</head>

<body>

<div class="card">

    <h1>📸 Upload Component</h1>

    <form action="/predict"
          method="POST"
          enctype="multipart/form-data">

        <input type="file"
               name="image"
               required>

        <br><br>

        <button type="submit">
            Detect Component
        </button>

    </form>

    <br>

    <a href="/">
        ← Back to Dashboard
    </a>

</div>

</body>
</html>
