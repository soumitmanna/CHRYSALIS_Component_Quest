<!DOCTYPE html>
<html>
<head>

<title>Inventory Database</title>

<style>

    body{
        font-family: Arial, sans-serif;
        background:#f4f7fa;
        padding:30px;
        margin:0;
    }

    h1{
        text-align:center;
        color:#2c3e50;
    }

    .container{
        max-width:1000px;
        margin:auto;
    }

    .card{
        background:white;
        border-radius:15px;
        padding:20px;
        box-shadow:0px 4px 10px rgba(0,0,0,0.1);
    }

    table{
        width:100%;
        border-collapse:collapse;
        margin-top:20px;
    }

    th{
        background:#3498db;
        color:white;
        padding:12px;
    }

    td{
        padding:12px;
        border:1px solid #ddd;
        text-align:center;
    }

    tr:nth-child(even){
        background:#f9f9f9;
    }

    .button{
        display:inline-block;
        padding:12px 20px;
        background:#3498db;
        color:white;
        text-decoration:none;
        border-radius:10px;
        margin-top:20px;
    }

    .button:hover{
        background:#2980b9;
    }

</style>

</head>

<body>

<div class="container">

<div class="card">

    <h1>📦 Inventory Database</h1>

    <table>

        <tr>
            <th>ID</th>
            <th>Component</th>
            <th>Confidence</th>
            <th>Timestamp</th>
        </tr>

        {% for item in items %}

        <tr>
            <td>{{ item[0] }}</td>
            <td>{{ item[1] }}</td>
            <td>{{ item[2] }}</td>
            <td>{{ item[3] }}</td>
        </tr>

        {% endfor %}

    </table>

    <center>
        <a href="/" class="button">
            Back to Dashboard
        </a>
    </center>

</div>

</div>

</body>
</html>
